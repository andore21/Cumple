<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación - Andrea Coaquira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&family=Playfair+Display:italic,wght@0,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffe5ec;
            font-family: 'Lato', sans-serif;
            color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ANIMACIÓN AUTOMÁTICA DEL SOBRE --- */
        #envelope-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #e8def8 0%, #c2e7ff 100%);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Se desliza hacia arriba automáticamente después de 1.5 segundos */
            animation: slideUp 1s ease-in-out forwards;
            animation-delay: 1.5s; 
        }

        .envelope {
            width: 90%;
            max-width: 400px;
            height: 260px;
            background-color: #ffffff;
            border-radius: 15px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 2px solid #ffb3c6;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 200px solid transparent;
            border-right: 200px solid transparent;
            border-top: 130px solid #f3e5f5;
            z-index: 1;
        }

        @media(max-width: 420px) {
            .envelope-flap {
                border-left-width: 165px;
                border-right-width: 165px;
                border-top-width: 110px;
            }
        }

        .wax-seal {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffd700 0%, #b8860b 100%);
            border-radius: 50%;
            position: absolute;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(184, 134, 11, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 32px;
            border: 2px dashed #ffffff;
        }

        .envelope-text {
            position: absolute;
            bottom: 25px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            color: #b8860b;
            letter-spacing: 1px;
            font-size: 13px;
        }

        @keyframes slideUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120%); opacity: 0; visibility: hidden; }
        }

        .card {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(251, 111, 146, 0.25);
            text-align: center;
            max-width: 440px;
            width: 100%;
            border: 3px solid #ffb3c6;
            margin: 20px
