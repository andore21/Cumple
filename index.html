    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffe5ec;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.15) 1px, transparent 1px),
                radial-gradient(circle at 75% 15%, rgba(255, 215, 0, 0.2) 2px, transparent 2px),
                radial-gradient(circle at 50% 85%, rgba(123, 44, 191, 0.1) 2px, transparent 2px),
                radial-gradient(circle at 10% 75%, rgba(251, 111, 146, 0.2) 1px, transparent 1px),
                linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #f3e5f5 100%);
            background-size: 40px 40px, 60px 60px, 80px 80px, 50px 50px, 100% 100%;
            font-family: 'Lato', sans-serif;
            color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- OVERLAY DE SOBRE INTERACTIVO --- */
        #envelope-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #e8def8 0%, #c2e7ff 100%);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s;
            cursor: pointer;
        }

        .envelope-hidden {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none;
        }

        .envelope {
            width: 90%;
            max-width: 400px;
            height: 260px;
            background-color: #ffffff;
            border-radius: 15px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 2px solid #ffb3c6;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 200px solid transparent;
            border-right: 200px solid transparent;
            border-top: 130px solid #f3e5f5;
            z-index: 1;
        }

        @media(max-width: 420px) {
            .envelope-flap {
                border-left-width: 165px;
                border-right-width: 165px;
                border-top-width: 110px;
            }
        }

        .wax-seal {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffd700 0%, #b8860b 100%);
            border-radius: 50%;
            position: absolute;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(184, 134, 11, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 32px;
            border: 2px dashed #ffffff;
        }
